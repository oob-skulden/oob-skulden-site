<style>
.ai-walkthrough-block {
  border: 1px solid #2a2a2a;
  border-left: 3px solid #4a9eff;
  background: #111;
  border-radius: 4px;
  padding: 1rem 1.25rem;
  margin: 1.75rem 0;
}
.ai-walkthrough-inner {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}
.ai-walkthrough-icon {
  font-size: 1.4rem;
  color: #4a9eff;
  flex-shrink: 0;
}
.ai-walkthrough-text {
  flex: 1;
  min-width: 200px;
  font-size: 0.875rem;
  line-height: 1.5;
  color: #ccc;
}
.ai-walkthrough-text strong {
  display: block;
  color: #fff;
  margin-bottom: 0.2rem;
  font-size: 0.9rem;
}
.ai-walkthrough-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.4rem;
  flex-shrink: 0;
}
.ai-walkthrough-btn {
  background: #1a1a2e;
  color: #4a9eff;
  border: 1px solid #4a9eff;
  border-radius: 3px;
  padding: 0.45rem 1rem;
  font-size: 0.8rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}
.ai-walkthrough-btn:hover {
  background: #4a9eff;
  color: #000;
}
.ai-walkthrough-btn.ai-walkthrough-copied {
  background: #1a3a1a;
  color: #4aff7a;
  border-color: #4aff7a;
}
.ai-walkthrough-toggle {
  background: none;
  border: none;
  color: #555;
  font-size: 0.72rem;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
  text-underline-offset: 2px;
  transition: color 0.15s;
}
.ai-walkthrough-toggle:hover {
  color: #888;
}
.ai-walkthrough-preview {
  display: none;
  margin: 0.75rem 0 0 0;
  padding: 0.75rem 1rem;
  background: #0a0a0a;
  border: 1px solid #222;
  border-radius: 3px;
  font-size: 0.75rem;
  line-height: 1.6;
  color: #aaa;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: monospace;
}
.ai-walkthrough-preview--visible {
  display: block;
}
.ai-walkthrough-confirm {
  font-size: 0.78rem;
  color: #4aff7a;
  margin-top: 0.4rem;
  min-height: 1rem;
}
</style>

<script src="/js/ai-walkthrough.js"></script>

{{- if and .IsPage (eq .Type "posts") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "url": {{ .Permalink | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "author": {
    "@type": "Person",
    "name": "Oob Skulden™",
    "url": "https://oobskulden.com/about/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Oob Skulden™",
    "url": "https://oobskulden.com"
  },
  "proficiencyLevel": "Advanced",
  {{- with .Params.cve_references }}
  "mentions": [
    {{- range $i, $cve := . }}
    {{- if $i }},{{ end }}
    {
      "@type": "SoftwareApplication",
      "name": {{ $cve | jsonify }}
    }
    {{- end }}
  ],
  {{- end }}
  {{- with .Params.tools_used }}
  "programmingLanguage": {{ . | jsonify }},
  {{- end }}
  "isPartOf": {
    "@type": "Blog",
    "name": "Oob Skulden™",
    "url": "https://oobskulden.com"
  }
}
</script>
{{- end }}
