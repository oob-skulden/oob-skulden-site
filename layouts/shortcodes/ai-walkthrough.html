<div class="ai-walkthrough-block" data-url="{{ .Page.Permalink }}">
  <div class="ai-walkthrough-inner">
    <span class="ai-walkthrough-icon">⟳</span>
    <div class="ai-walkthrough-text">
      <strong>Follow along interactively</strong>
      <span>Copy this prompt into any AI with web access — Claude, ChatGPT, Gemini — and it will walk you through every step.</span>
    </div>
    <div class="ai-walkthrough-actions">
      <button class="ai-walkthrough-btn" type="button">Copy walkthrough prompt</button>
      <button class="ai-walkthrough-toggle" type="button" aria-expanded="false">inspect prompt</button>
    </div>
  </div>
  <pre class="ai-walkthrough-preview" aria-hidden="true"></pre>
  <div class="ai-walkthrough-confirm" aria-live="polite"></div>
</div>
