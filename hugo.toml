baseURL = "https://oobskulden.com/"
languageCode = "en-us"
title = "Oob Skulden"
theme = "PaperMod"

# URL behavior
relativeURLs = false
canonifyURLs = false

# SEO basics
enableRobotsTXT = true

[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

[pagination]
pagerSize = 10

[taxonomies]
series = "series"
tag = "tags"
category = "categories"

# Posts will be like: /2024/12/my-post-title/
# The list page is still /posts/
[permalinks]
posts = "/:year/:month/:title/"

[params]
mainSections = ["posts"]
# PaperMod uses this; keep production in Netlify
env = "production"

description = "Practical security guidance for home lab enthusiasts"
author = "Oob Skulden"

ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true

defaultTheme = "auto"
ShowSearchPage = true

[params.profileMode]
enabled = true
title = "Security Without the Enterprise Budget"
subtitle = """
Practical security for home labbers. Open source tools. Self-hosted architectures. Real detection queries. Actual remediation code.

**No theory. Vendor-agnostic. Just working solutions.**
"""




[params.label]
text = "Oob Skulden"
subtitle = "Security patterns, failures, and fixes --- from the trenches."
icon = "/images/oob.png"
iconHeight = 60

# ── Navigation menu ──────────────────────────────
[[menus.main]]
  name = "Articles"
  url = "/posts/"
  weight = 10

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 50

[[menus.main]]
  name = "Search"
  url = "/search/"
  weight = 60

[params.footer]
  hideCopyright = true
